{% extends "core_orchestrator/base.html" %}

{% block title %}Heatmap Dashboard — Drone Orchestrator{% endblock %}

{% block content %}
<div class="h-[calc(100vh-6rem)] flex flex-col">
    <h1 class="text-2xl font-bold text-white mb-6 flex-shrink-0">Heatmap Dashboard</h1>

    <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6 min-h-0">
        <!-- Left Panel: Controls -->
        <div class="lg:col-span-1 bg-gray-800 rounded-xl p-5 shadow-lg border border-gray-700 overflow-y-auto">
            <h2 class="text-lg font-semibold text-green-400 mb-5">Controls</h2>

            <form method="post" action="{% url 'core_orchestrator:heatmap_dashboard' %}" class="space-y-5">
                {% csrf_token %}

                <!-- Model Paths -->
                <div>
                    <h3 class="text-sm font-medium text-gray-300 mb-2">Model Paths</h3>
                    <div class="space-y-3">
                        <div>
                            <label for="llm_model_path" class="block text-xs text-gray-400 mb-1">LLM Model Path</label>
                            <input type="text" id="llm_model_path" name="llm_model_path"
                                   value="{{ llm_model_path|default:'' }}"
                                   placeholder="/path/to/llm/model"
                                   class="w-full px-3 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                        </div>
                        <div>
                            <label for="sam3_model_path" class="block text-xs text-gray-400 mb-1">SAM3 Model Path</label>
                            <input type="text" id="sam3_model_path" name="sam3_model_path"
                                   value="{{ sam3_model_path|default:'' }}"
                                   placeholder="/path/to/sam3/model"
                                   class="w-full px-3 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                        </div>
                    </div>
                </div>

                <!-- Weights Path -->
                <div>
                    <label for="weights_path" class="block text-sm font-medium text-gray-300 mb-1">Weights Path</label>
                    <input type="text" id="weights_path" name="weights_path"
                           value="{{ weights_path|default:'' }}"
                           placeholder="/path/to/weights"
                           class="w-full px-3 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                </div>

                <!-- SAM3 Mode Toggle -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">SAM3 Mode</label>
                    <div class="flex rounded-lg overflow-hidden border border-gray-600">
                        <label class="flex-1 text-center cursor-pointer transition-colors
                            {% if sam3_mode == 'local' %}bg-green-700 text-white{% else %}bg-gray-700 text-gray-400 hover:bg-gray-600{% endif %}">
                            <input type="radio" name="sam3_mode" value="local"
                                   {% if sam3_mode == 'local' %}checked{% endif %}
                                   class="sr-only">
                            <span class="block py-2 text-sm font-medium">Local</span>
                        </label>
                        <label class="flex-1 text-center cursor-pointer transition-colors
                            {% if sam3_mode == 'remote' %}bg-green-700 text-white{% else %}bg-gray-700 text-gray-400 hover:bg-gray-600{% endif %}">
                            <input type="radio" name="sam3_mode" value="remote"
                                   {% if sam3_mode == 'remote' %}checked{% endif %}
                                   class="sr-only">
                            <span class="block py-2 text-sm font-medium">Remote</span>
                        </label>
                    </div>
                </div>

                <!-- LLM Mode Toggle -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">LLM Mode</label>
                    <div class="flex rounded-lg overflow-hidden border border-gray-600">
                        <label class="flex-1 text-center cursor-pointer transition-colors
                            {% if llm_mode == 'local' %}bg-green-700 text-white{% else %}bg-gray-700 text-gray-400 hover:bg-gray-600{% endif %}">
                            <input type="radio" name="llm_mode" value="local"
                                   {% if llm_mode == 'local' %}checked{% endif %}
                                   class="sr-only">
                            <span class="block py-2 text-sm font-medium">Local</span>
                        </label>
                        <label class="flex-1 text-center cursor-pointer transition-colors
                            {% if llm_mode == 'remote' %}bg-green-700 text-white{% else %}bg-gray-700 text-gray-400 hover:bg-gray-600{% endif %}">
                            <input type="radio" name="llm_mode" value="remote"
                                   {% if llm_mode == 'remote' %}checked{% endif %}
                                   class="sr-only">
                            <span class="block py-2 text-sm font-medium">Remote</span>
                        </label>
                    </div>
                </div>

                <!-- Remote Host Connection -->
                <div>
                    <h3 class="text-sm font-medium text-gray-300 mb-2">Remote Host Connection</h3>
                    <div class="space-y-3">
                        <div>
                            <label for="remote_host" class="block text-xs text-gray-400 mb-1">Remote Host IP</label>
                            <input type="text" id="remote_host" name="remote_host"
                                   value="{{ remote_host|default:'' }}"
                                   placeholder="192.168.1.100"
                                   class="w-full px-3 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                        </div>
                        <div>
                            <label for="remote_port" class="block text-xs text-gray-400 mb-1">Remote Port</label>
                            <input type="number" id="remote_port" name="remote_port"
                                   value="{{ remote_port|default:'8080' }}"
                                   placeholder="8080"
                                   class="w-full px-3 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                        class="w-full px-4 py-2.5 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg transition-colors shadow-md">
                    Apply Settings
                </button>
            </form>
        </div>

        <!-- Right Panel: MJPEG Stream -->
        <div class="lg:col-span-2 bg-gray-800 rounded-xl shadow-lg border border-gray-700 flex flex-col overflow-hidden">
            <div class="p-3 border-b border-gray-700 flex items-center justify-between">
                <h2 class="text-lg font-semibold text-green-400">Live Stream</h2>
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-900 text-green-300">
                    <svg class="w-2 h-2 mr-1.5 animate-pulse" fill="currentColor" viewBox="0 0 8 8">
                        <circle cx="4" cy="4" r="3" />
                    </svg>
                    Live
                </span>
            </div>
            <div class="flex-1 flex items-center justify-center bg-black p-2">
                <img src="{% url 'core_orchestrator:heatmap_stream' %}"
                     alt="Heatmap Stream"
                     class="max-w-full max-h-full object-contain rounded">
            </div>
        </div>
    </div>
</div>
{% endblock %}
