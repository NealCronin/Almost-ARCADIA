<section class="rounded-lg bg-gray-800 border border-gray-700 overflow-hidden">
    <div class="p-4 border-b border-gray-700 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
        <div>
            <h2 class="text-lg font-semibold text-green-400">Heatmap Output</h2>
            <p id="statusText" class="text-sm text-gray-400 mt-1">Idle</p>
        </div>
        <div class="flex flex-wrap gap-3">
            <a id="downloadVideo" href="#" class="hidden px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition-colors font-medium">
                Download video.avi
            </a>
            <a id="downloadHeatmap" href="#" class="hidden px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-700 transition-colors font-medium">
                Download heatmap.avi
            </a>
        </div>
    </div>

    <div class="bg-black min-h-[420px] flex items-center justify-center p-4">
        <img id="heatmapPreview" alt="Heatmap preview" class="hidden max-w-full max-h-[640px] object-contain rounded-lg shadow-2xl">
        <div id="emptyPreview" class="text-center text-gray-500 px-6">
            <p class="text-lg font-medium text-gray-300 mb-2">No heatmap video yet</p>
            <p class="text-sm">Run the priority heatmap job to generate a watchable `heatmap.avi` preview.</p>
        </div>
    </div>

    <div class="p-4 border-t border-gray-700 bg-gray-900/70">
        <div class="flex items-center justify-between mb-2">
            <h3 class="font-semibold text-white">Run Log</h3>
            <span id="runId" class="text-xs text-gray-500"></span>
        </div>
        <pre id="logTail" class="max-h-56 overflow-auto rounded-lg bg-black/50 p-3 text-left text-xs leading-5 text-green-200 whitespace-pre-wrap"></pre>
    </div>
</section>
