{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Almost ARCADIA{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'web/app.css' %}">
  <script src="{% static 'web/app.js' %}" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="{% url 'home' %}"><span class="brand__mark">A</span><span>Almost ARCADIA</span></a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="{% url 'client' %}">Client</a>
        <a href="{% url 'priority_map_models' %}">Models</a>
        <a href="{% url 'analysis' %}">Analysis</a>
        <a href="{% url 'results' %}">Results</a>
        <a href="{% url 'host' %}">Host</a>
      </nav>
    </div>
  </header>
  <main class="page-shell">
    {% if messages %}
      <div class="message-stack" aria-live="polite">
        {% for message in messages %}<p class="message message--{{ message.tags|default:'info' }}">{{ message }}</p>{% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
